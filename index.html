<header id="header">
    <div class="logo">Mano Parduotuvė</div>
    <nav class="nav">
        <span role="button" tabindex="0" onclick="location.href='/'">Pagrindinis</span>
        <span role="button" tabindex="0" onclick="location.href='/products'">Prekės</span>
    </nav>
</header>

<main id="main">
    <section class="search-section">
        <label for="search">Ieškoti:</label>
        <input type="text" id="search">
        
        <div class="button" role="button" tabindex="0" onclick="search()">Ieškoti</div>
    </section>

    <div class="filter-dropdown">
        <div class="label">Rūšiuoti pagal:</div>
        <div class="dropdown-toggle" role="button" tabindex="0" aria-haspopup="listbox" aria-expanded="false">
            Pasirinkite...
        </div>
        <div class="options" style="display:none" role="listbox">
            <div role="option">Pigiausios viršuje</div>
            <div role="option">Brangiausios viršuje</div>
        </div>
    </div>

    <div class="alert-box" aria-live="polite">
        Prekė sėkmingai pridėta į krepšelį!
    </div>
</main>
